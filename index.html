<!doctype html>
<html lang="ms">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12002f" />
    <title>Sila Koyakan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Poster reveal">
      <section class="poster-shell" aria-live="polite">
        <img
          id="poster"
          class="poster-image"
          src="./assets/poster.jpeg"
          alt="Poster Mastering Basic AnyGen AI"
        />
      </section>

      <section id="curtain" class="curtain" aria-label="Tirai koyakan">
        <canvas id="tearCanvas" aria-hidden="true"></canvas>
        <div class="curtain-copy" aria-hidden="true">
          <p class="curtain-kicker">RAHSIA DI SEBALIK TIRAI</p>
          <h1><span>SILA</span> <span>KOYAKAN</span></h1>
          <p class="curtain-hint">Tarik dari atas ke bawah untuk reveal poster</p>
        </div>
      </section>
      <button id="resetButton" class="reset-button" type="button" aria-label="Pasang semula tirai">
        Reset
      </button>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
